services:
  backend:
    build: .
    container_name: job-apply-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/job-apply.db
      - JWT_SECRET=your-super-secret-jwt-key-change-this
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - job-apply-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  job-apply-network:
    driver: bridge